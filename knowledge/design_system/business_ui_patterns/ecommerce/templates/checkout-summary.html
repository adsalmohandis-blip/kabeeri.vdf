<aside class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <h2 class="h5 mb-0">Order summary</h2>
    <span class="badge text-bg-light">{{itemCount}} items</span>
  </div>
  <div class="card-body">
    <dl class="row mb-0">
      <dt class="col-7 fw-normal text-muted">Subtotal</dt>
      <dd class="col-5 text-end">{{subtotal}}</dd>
      <dt class="col-7 fw-normal text-muted">Shipping</dt>
      <dd class="col-5 text-end">{{shipping}}</dd>
      <dt class="col-7 fw-normal text-muted">Tax</dt>
      <dd class="col-5 text-end">{{tax}}</dd>
      <dt class="col-7 fs-5">Total</dt>
      <dd class="col-5 text-end fs-5 fw-semibold">{{total}}</dd>
    </dl>
    <button class="btn btn-primary w-100 mt-4" type="button">
      <i class="bi bi-credit-card me-2"></i>
      Place order
    </button>
  </div>
</aside>

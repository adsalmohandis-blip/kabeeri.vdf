<article class="card h-100 product-card">
  <div class="ratio ratio-4x3 bg-light">
    <img src="{{imageUrl}}" class="card-img-top object-fit-cover" alt="{{productName}}">
  </div>
  <div class="card-body d-flex flex-column gap-3">
    <div>
      <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
        <span class="badge text-bg-success">{{badge}}</span>
        <button class="btn btn-outline-secondary btn-sm" type="button" aria-label="Save product">
          <i class="bi bi-heart"></i>
        </button>
      </div>
      <h3 class="h6 mb-1">{{productName}}</h3>
      <p class="text-muted small mb-0">{{summary}}</p>
    </div>
    <div class="mt-auto d-flex align-items-center justify-content-between gap-3">
      <strong class="fs-5">{{price}}</strong>
      <button class="btn btn-primary btn-sm" type="button">
        <i class="bi bi-cart-plus me-2"></i>
        Add
      </button>
    </div>
  </div>
</article>

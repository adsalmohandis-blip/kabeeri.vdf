<section class="card">
  <div class="card-body">
    <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
      <div>
        <h2 class="h5 mb-1">Setup checklist</h2>
        <p class="text-muted mb-0">Complete the essentials to activate this workspace.</p>
      </div>
      <span class="badge text-bg-primary">{{completed}}/{{total}}</span>
    </div>
    <div class="list-group list-group-flush">
      <button class="list-group-item list-group-item-action d-flex align-items-center justify-content-between gap-3" type="button">
        <span><i class="bi bi-check-circle text-success me-2"></i>{{stepTitle}}</span>
        <i class="bi bi-chevron-right text-muted"></i>
      </button>
    </div>
  </div>
</section>

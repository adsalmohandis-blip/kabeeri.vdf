<article class="card">
  <div class="card-body">
    <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
      <h3 class="h6 mb-0">{{metricName}}</h3>
      <span class="badge text-bg-light">{{period}}</span>
    </div>
    <div class="display-6 fw-semibold mb-2">{{value}}</div>
    <div class="progress" role="progressbar" aria-label="{{metricName}}" aria-valuenow="{{percent}}" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar" style="width: {{percent}}%"></div>
    </div>
    <p class="text-muted small mt-3 mb-0">{{helperText}}</p>
  </div>
</article>
